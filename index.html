<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apps by Siddharth | Calculator Liquid UI</title>
    <style>
        /* सिद्धार्थ भाई, यहाँ से डिजाइन शुरू होता है */
        body {
            background-color: #0d1117; /* एकदम डार्क प्रोफेशनल बैकग्राउंड */
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            text-align: center;
            padding: 20px;
            max-width: 400px;
            width: 90%;
        }

        .brand-name {
            font-size: 28px;
            font-weight: bold;
            color: #58a6ff;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .app-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: transform 0.3s;
        }

        .app-card:hover {
            transform: translateY(-5px);
        }

        .app-icon {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #0081FF, #0045FF);
            border-radius: 22%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            box-shadow: 0 5px 15px rgba(0,129,255,0.4);
        }

        h1 { font-size: 22px; margin: 10px 0; }
        p { color: #8b949e; font-size: 14px; line-height: 1.6; }

        .btn-download {
            background-color: #238636; /* हरा बटन डाउनलोड के लिए */
            color: white;
            padding: 15px 40px;
            text-decoration: none;
            border-radius: 12px;
            font-weight: bold;
            display: inline-block;
            margin-top: 25px;
            font-size: 16px;
            transition: 0.2s;
        }

        .btn-download:hover { background-color: #2ea043; }

        .footer {
            margin-top: 40px;
            font-size: 12px;
            color: #484f58;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="brand-name">Apps by Siddharth</div>

        <div class="app-card">
            <div class="app-icon">➕</div> <h1>Calculator - Liquid UI</h1>
            <p>खूबसूरत एनीमेशन और शानदार डार्क मोड के साथ बना हुआ सिद्धार्थ भाई का अपना कैलकुलेटर।</p>
            
            <div style="color: #f0883e; font-size: 12px; margin-top: 10px; font-weight: bold;">
                Version: 1.0 (Latest)
            </div>

            <a href="#" class="btn-download">Download APK</a>
        </div>

        <div class="footer">
            &copy; 2026 Apps by Siddharth | Made with ❤️ for Android
        </div>
    </div>

</body>
</html>
